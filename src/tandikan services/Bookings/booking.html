<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Service</title>

    <link rel="stylesheet" href="style.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>

<body>

<header>
    <h1>Tandikan Services</h1>
</header>

<section class="booking-wrapper">
<div class="booking-card">

    <h2>Book a Service</h2>
    <p>Fill in the details below to schedule your service.</p>

    <!-- BOOKING FORM -->
    <form id="bookingForm">

        <!-- NAME -->
        <input
            type="text"
            name="name"
            id="name"
            placeholder="Full Name"
            required
        >

        <!-- PHONE -->
        <input
            type="tel"
            name="phone"
            id="phone"
            placeholder="Mobile Number"
            required
            pattern="[0-9]{10,15}"
        >

        <!-- ADDRESS -->
        <h3>📍 Service Location</h3>

        <input
            type="text"
            name="address"
            id="address"
            placeholder="Search address in Puerto Princesa..."
            required
        >

        <button type="button" id="searchAddress">
            🔎 Search Location
        </button>

        <button type="button" id="currentLocation">
            📍 Use My Current Location
        </button>

        <!-- MAP -->
        <div id="map"></div>

        <!-- COORDINATES -->
        <input type="hidden" id="latitude" name="latitude">
        <input type="hidden" id="longitude" name="longitude">

        <!-- SERVICE TYPE -->
        <h3>Select a Service</h3>

        <div class="service-options">

            <label>
                <input type="radio" name="service" value="Cleaning" required>
                🧹 Cleaning
            </label>

            <label>
                <input type="radio" name="service" value="Plumbing">
                🔧 Plumbing
            </label>

            <label>
                <input type="radio" name="service" value="Electrical">
                ⚡ Electrical
            </label>

            <label>
                <input type="radio" name="service" value="Gardening">
                🌱 Gardening
            </label>

            <label>
                <input type="radio" name="service" value="Painting">
                🎨 Painting
            </label>

            <label>
                <input type="radio" name="service" value="Appliance Repair">
                🛠️ Appliance Repair
            </label>

            <label>
                <input type="radio" name="service" value="Aircon Cleaning">
                ❄️ Aircon Cleaning
            </label>

            <label>
                <input type="radio" name="service" value="Carpentry">
                🪚 Carpentry
            </label>

        </div>

        <h3>
            Total Payment:
            <span id="priceDisplay">₱0</span>
        </h3>

        <!-- DATE -->
        <input
            type="date"
            id="date"
            name="date"
            required
        >

        <!-- TIME -->
        <input
            type="time"
            id="time"
            name="time"
            required
        >
        <!-- PAYMENT METHOD -->
        <h3>Payment Method</h3>

        <label>
            <input type="radio" name="paymentMethod" value="Cash" checked>
            Cash on Service
        </label>

        <label>
            <input type="radio" name="paymentMethod" value="GCash">
            GCash
        </label>

        <label>
            <input type="radio" name="paymentMethod" value="Bank Transfer">
            Bank Transfer
        </label>

        <!-- SUBMIT -->
        <button type="submit">
            Confirm Booking
        </button>

    </form>

    <a href="../homepage/view.html" class="back-btn">
        ← Back to Home
    </a>

</div>
</section>

<!-- MAP LIBRARY -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- YOUR MAP SCRIPT -->
<script src="../Map/map.js"></script>

<!-- BOOKING LOGIC -->
<script type="module" src="booking.js"></script>

</body>
</html>
