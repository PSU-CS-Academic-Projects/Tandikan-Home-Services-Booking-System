<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="container">

    <h2>🔐 Admin Login</h2>

    <input
        type="email"
        id="email"
        placeholder="Admin Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button onclick="adminLogin()">
        Login as Admin
    </button>

    <p class="switch">
        Return to
        <a href="login.html">
            Customer Login
        </a>
    </p>

</div>

<script src="admin-login.js"></script>

</body>
</html>
